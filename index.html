<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm người yêu tớ nhá ❤️</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔒 LOCK SCREEN -->
    <div class="lock-screen" id="lockScreen">
        <div class="lock-box">
            <div class="lock-image"></div>
            <p class="lock-question">Bạn có phải là người ấy không? 💕</p>
            <input type="text" id="nameInput" placeholder="Nhập tên của bạn..." />
            <button id="lockSubmit">Xác nhận</button>
            <p class="lock-error" id="lockError"></p>
        </div>
    </div>

    <!-- 🔊 Music Toggle -->
    <button id="music" aria-label="Toggle music"> 🎵 </button>

    <!-- 🎨 Theme -->
    <button id="theme" aria-label="Change theme"> 🎨 </button>

    <!-- 💌 MAIN CONTAINER -->
    <div class="container" id="mainApp" style="display: none;">
        <div class="card" id="card">
            <div class="image" id="img"></div>
            <p class="question" id="text">
                Làm người yêu tớ nha! ❤️
            </p>

            <button id="gift">💝 Ấn vào đây nè</button>

        </div>

        <!-- Buttons OUTSIDE card for fixed position -->
        <div class="buttons">
            <button class="yes-button">Đồng ý</button>
            <button class="no-button">Không</button>
        </div>
    </div>

    <!-- 💖 POPUP -->
    <div class="popup" id="popup" role="dialog" aria-modal="true">
        <div class="popup-box">
            <span class="popup-heart">💖</span>
            <h2>Cho riêng em 💕</h2>

            <p class="popup-text">
                abc
                xyz
                dree
            </p>

            <div class="popup-actions">
                <button id="close-popup">Close</button>
            </div>
        </div>
    </div>

    <!-- 🎵 BACKGROUND MUSIC -->
    <audio id="bg-music" loop>
        <source src="assets/bg-love-music.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
</body>

</html>
